<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Something for You 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

h1 {
    color: white;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #ff4b5c;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #ff6b81;
}

#message {
    margin-top: 25px;
    font-size: 30px;
    color: white;
    display: none;
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    from { transform: translateY(-100px); }
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Do you know what's the most beautiful thing in this world? 😍</h1>
    <button onclick="startPrank()">Tell Me 💌</button>
    <div id="message"></div>
</div>

<audio id="laugh" src="https://www.myinstants.com/media/sounds/evil-laugh.mp3"></audio>

<script>
function startPrank() {
    let msg = document.getElementById("message");
    msg.style.display = "block";
    msg.innerHTML = "It's YOU ❤️";

    createConfetti();

    setTimeout(() => {
        msg.innerHTML = "😂 HAHA APRIL FOOL!";
        document.getElementById("laugh").play();
        document.body.style.background = "black";
    }, 5000);
}

function createConfetti() {
    for (let i = 0; i < 50; i++) {
        let div = document.createElement("div");
        div.classList.add("confetti");
        div.style.left = Math.random() * 100 + "vw";
        div.style.background = randomColor();
        div.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(div);
    }
}

function randomColor() {
    let colors = ["red", "yellow", "blue", "green", "pink"];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
